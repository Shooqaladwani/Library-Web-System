<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="project/css/styles.css">
   <title>BookFlow - Contact Us</title>
   <style>

      .text-overlay {
         position: absolute;
         top: 50%;
         left: 50%;
         transform: translate(-50%, -50%);
         font-size: 18px;
         text-shadow: 1px 1px 2px black;
         z-index: 1;
      }


      form {
         display: inline-block;
         text-align: left;
      }

      form label,
      form input,
      form textarea,
      form button {
         display: block;
         margin: 10px auto;
      }

      form input,
      form textarea {
         width: 300px;
         padding: 5px;
         border: 1px solid #ccc;
         border-radius: 5px;
      }

      button {
         background-color: #6e4e22;
         color: white;
         border: none;
         cursor: pointer;
         padding: 10px 20px;
         border-radius: 5px;
         transition: background-color 0.3s;
      }

      button:hover {
         background-color: #8b5e2a;
      }

      h1,
      p {
         margin-bottom: 20px;
      }

      a {
         color: #ffa500;
         text-decoration: none;
      }
   </style>
   <script>
      function submitForm(event) {
         event.preventDefault();
         alert("Data has been sent successfully!");
         event.target.reset();
      }
   </script>
</head>

<body>
   <div class="video-wrapper">
      <video autoplay muted loop>
         <source src="project/books/Background.mp4" type="video/mp4">
         Your browser does not support the video tag.
      </video>
   </div>
      <header>
         <img src="project/books/Logo.png" alt="Public Library" />
         <nav class="navigation">
            <ul>
               <li><a href="Home.html">Home</a></li>
               <li><a href="Books.html">Books</a></li>
               <li><a href="Contact Us.html">Contact Us</a></li>
               <li><a href="Dashboard.php">Dashboard</a></li>
            </ul>
         </nav>
      </header>
      <div class="text-overlay">
         <div class="contact-container">
            <h1>Contact Us</h1>
            <p>If you have any questions, please fill out the form below and we will get back to you as soon as
               possible.</p>
            <form action="#" method="post" onsubmit="submitForm(event)">
               <label for="name">Name</label>
               <input type="text" id="name" name="name" placeholder="Your full name" required>

               <label for="email">Email</label>
               <input type="email" id="email" name="email" placeholder="Your email address" required>

               <label for="message">Your message:</label>
               <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>

               <button type="submit">Submit</button>
            </form>
            <p>For more information, visit our <a href="Home.html">Home</a>.</p>
         </div>
      </div>
   </div>
   <footer>
      <p>&copy; 2025 BookFlow. All rights reserved.</p>
  </footer>
</body>

</html>
